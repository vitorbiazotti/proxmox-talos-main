apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: addons-web-access
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    repoURL: https://github.com/vitorbiazotti/proxmox-talos-main.git
    targetRevision: main
    path: gitops/manifests/addons-web-access
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-ingress
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
