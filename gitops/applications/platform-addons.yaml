apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '1'
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 7.0.0
    helm:
      releaseName: loki
      values: |
        deploymentMode: SingleBinary
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          schemaConfig:
            configs:
            - from: '2024-04-01'
              store: tsdb
              object_store: filesystem
              schema: v13
              index:
                prefix: loki_index_
                period: 24h
          storage:
            type: filesystem
        singleBinary:
          replicas: 1
          persistence:
            enabled: true
            storageClass: local-path
            size: 20Gi
        read:
          replicas: 0
        write:
          replicas: 0
        backend:
          replicas: 0
        chunksCache:
          enabled: false
        resultsCache:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    - RespectIgnoreDifferences=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '2'
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 87.15.1
    helm:
      releaseName: kube-prometheus-stack
      values: |
        kubeEtcd:
          enabled: false
        prometheus:
          prometheusSpec:
            retention: 15d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: local-path
                  accessModes:
                  - ReadWriteOnce
                  resources:
                    requests:
                      storage: 30Gi
        grafana:
          persistence:
            enabled: true
            storageClassName: local-path
            size: 10Gi
          grafana.ini:
            auth:
              disable_login_form: true
            auth.anonymous:
              enabled: true
              org_role: Admin
          additionalDataSources:
          - name: Loki
            type: loki
            access: proxy
            url: http://loki-gateway.monitoring.svc.cluster.local
            isDefault: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    - RespectIgnoreDifferences=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opentelemetry-collector
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '3'
spec:
  project: default
  source:
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    chart: opentelemetry-collector
    targetRevision: 0.165.0
    helm:
      releaseName: opentelemetry-collector
      values: "mode: daemonset\nimage:\n  repository: otel/opentelemetry-collector-contrib\nresources:\n
        \ requests:\n    cpu: 100m\n    memory: 128Mi\n  limits:\n    cpu: 500m\n
        \   memory: 512Mi\npresets:\n  kubernetesAttributes:\n    enabled: true\n
        \ kubeletMetrics:\n    enabled: true\nserviceMonitor:\n  enabled: true\nports:\n
        \ otlp:\n    hostPort: \n  otlp-http:\n    hostPort: \n  jaeger-compact:\n
        \   enabled: false\n  jaeger-thrift:\n    enabled: false\n  jaeger-grpc:\n
        \   enabled: false\n  zipkin:\n    enabled: false\n  metrics:\n    enabled:
        true\nconfig:\n  exporters:\n    debug: {}\n  service:\n    pipelines:\n      traces:\n
        \       receivers:\n        - otlp\n        processors:\n        - memory_limiter\n
        \       - batch\n        exporters:\n        - debug\n      metrics:\n        receivers:\n
        \       - otlp\n        - prometheus\n        processors:\n        - memory_limiter\n
        \       - batch\n        exporters:\n        - debug\n      logs:\n        receivers:\n
        \       - otlp\n        processors:\n        - memory_limiter\n        - batch\n
        \       exporters:\n        - debug\n"
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    - RespectIgnoreDifferences=true
