apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zabbix-kubernetes-storage
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/vitorbiazotti/proxmox-talos-main.git
    targetRevision: main
    path: gitops/manifests/zabbix-kubernetes-storage
  destination:
    server: https://kubernetes.default.svc
    namespace: zabbix-monitoring
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
